name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m ruff check .
      - run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose config --quiet
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: spiderman-game-gdg:test
      - run: docker run --rm spiderman-game-gdg:test